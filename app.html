<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TestForal · Hacienda Bizkaia</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-512.png">
<meta name="theme-color" content="#1E3A8A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TestForal">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  /* === Marca cromática === */
  /* Primario azul institucional */
  --green:#1E3A8A; --green-d:#1E40AF; --green-l:#3B82F6;
  /* Tonos para el simulacro: misma familia azul, no púrpura */
  --purple:#1E3A8A; --purple-d:#172554;
  --purple-bg:#EFF6FF; --purple-bg-2:#DBEAFE; --purple-border:#BFDBFE;
  /* Acento ámbar */
  --orange:#F59E0B; --orange-d:#D97706;
  /* Error sobrio */
  --red:#DC2626; --red-d:#B91C1C;
  /* Azul info */
  --blue:#2563EB; --blue-d:#1D4ED8;
  /* Verde para success states (sobrio) */
  --ok:#16A34A; --ok-d:#15803D; --ok-bg:#DCFCE7;
  /* Dorado XP */
  --gold:#F59E0B;
  /* Neutros slate */
  --bg:#FFFFFF; --bg-2:#F8FAFC; --bg-3:#E2E8F0;
  --text:#0F172A; --text-2:#334155; --text-light:#64748B;
  --line:#E2E8F0; --line-2:#CBD5E1;
  /* === Sombras (con tinte azulado sutil) === */
  --shadow-sm:0 1px 2px rgba(15,23,42,.05);
  --shadow:0 2px 6px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 14px rgba(15,23,42,.08),0 2px 4px rgba(15,23,42,.04);
  --shadow-lg:0 10px 28px rgba(15,23,42,.12),0 4px 8px rgba(15,23,42,.06);
  /* === Tipografía === */
  --font-display:'Inter Tight','Inter',system-ui,-apple-system,sans-serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
  /* === Focus ring === */
  --ring:0 0 0 3px rgba(30,58,138,.18);
  --ring-danger:0 0 0 3px rgba(220,38,38,.18);
  /* === Radios consistentes === */
  --r-sm:6px; --r:8px; --r-md:10px; --r-lg:12px; --r-xl:16px;
  /* === Easing === */
  --ease:cubic-bezier(.22,.9,.36,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
@media (prefers-reduced-motion: reduce){
  *,*:before,*:after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
html,body{height:100%;font-family:var(--font-body);color:var(--text);overscroll-behavior:none;letter-spacing:-.005em;font-feature-settings:"cv11","ss01","ss03";text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{-webkit-user-select:none;user-select:none;background:var(--bg-2)}
.tnum{font-variant-numeric:tabular-nums}
h1,h2,h3,.display{font-family:var(--font-display);font-feature-settings:"cv11","ss01","ss03","ss04";letter-spacing:-.025em}
/* Focus rings accesibles (solo teclado) */
:focus{outline:none}
:focus-visible{outline:none;box-shadow:var(--ring)}
.btn:focus-visible,.opt:focus-visible,.opo-card:focus-visible,.unit:focus-visible,.exam-opt:focus-visible,.exam-cta:focus-visible,.mode-card:focus-visible{box-shadow:var(--ring)}
.btn.danger:focus-visible{box-shadow:var(--ring-danger)}
button{font-family:inherit;letter-spacing:inherit;border:none;cursor:pointer;background:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:transparent;position:relative}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);position:sticky;top:0;z-index:10;min-height:52px}
.topbar-left{display:flex;align-items:center;gap:10px}
.wordmark{font-family:var(--font-display);font-weight:800;font-size:16px;letter-spacing:-.025em;color:var(--text);display:inline-flex;align-items:center;gap:6px}
.wordmark .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(30,58,138,.15)}
.topbar-stats{display:flex;align-items:center;gap:4px}
.topbar-stat{display:inline-flex;align-items:center;gap:5px;font-weight:600;font-size:13px;font-variant-numeric:tabular-nums;color:var(--text-2);padding:5px 9px;border-radius:var(--r-sm);transition:background .15s}
.topbar-stat:hover{background:var(--bg-2)}
.topbar-stat .ico{color:var(--text-light)}
.topbar-stat.streak .ico{color:var(--orange)}
.topbar-stat.lives .ico{color:var(--red)}
.topbar-stat.gem .ico{color:var(--blue)}
.topbar-back{font-size:22px;color:var(--text-light);padding:4px 10px;font-weight:600}
.btn-exit{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line);border-radius:var(--r);padding:5px 10px;font-size:12px;font-weight:600;color:var(--text-light);cursor:pointer;letter-spacing:.1px;transition:background .15s,color .15s,border-color .15s;min-height:30px}
.btn-exit:hover{background:var(--bg-2);color:var(--text);border-color:var(--line-2)}
.btn-exit:active{transform:translateY(1px)}
.btn-exit .ic{font-size:14px}

/* ===== ONBOARDING (estilo Duolingo) ===== */
.onb{padding:18px 20px 28px;flex:1;display:flex;flex-direction:column}
.onb-mascot{display:flex;align-items:flex-start;gap:10px;margin:6px 0 22px}
.onb-mascot .m{width:120px;flex-shrink:0;animation:mascot-idle 3s ease-in-out infinite}
.onb-mascot .b{position:relative;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:600;color:var(--text);line-height:1.4;margin-top:30px;flex:1;box-shadow:var(--shadow)}
.onb-mascot .b:before{content:'';position:absolute;left:-9px;top:20px;border:7px solid transparent;border-right-color:var(--line)}
.onb-mascot .b:after{content:'';position:absolute;left:-7px;top:20px;border:7px solid transparent;border-right-color:#fff}
.onb-grid{display:grid;grid-template-columns:1fr;gap:10px}
.opo-card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;transition:border-color .15s var(--ease),box-shadow .18s var(--ease),transform .12s var(--ease);display:flex;align-items:center;gap:14px;text-align:left;box-shadow:var(--shadow-sm);min-height:72px}
.opo-card:hover{border-color:var(--line-2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.opo-card:active{transform:translateY(0)}
.opo-card.disabled{opacity:.55;cursor:not-allowed}
.opo-card.disabled:hover{border-color:var(--line);box-shadow:var(--shadow-sm)}
.opo-icon{width:44px;height:44px;border-radius:10px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;color:var(--green)}
.opo-body{flex:1;min-width:0}
.opo-card .opo-title{font-size:15px;font-weight:700;line-height:1.25;margin-bottom:3px;color:var(--text)}
.opo-card .opo-org{font-size:11px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.opo-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
.opo-pill.live{background:#DCFCE7;color:#15803D}
.opo-pill.soon{background:#FEF3C7;color:#92400E}
.opo-lock{font-size:16px;color:var(--text-light)}

/* ===== TREE ===== */
.tree{padding:8px 20px 100px;flex:1}
.tree-head{padding:18px 0 20px;border-bottom:1px solid var(--line);margin-bottom:22px}
.tree-title{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--text);margin-bottom:6px;line-height:1.15}
.tree-org{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.9px}

/* Section ribbon (compacto, eyebrow + título) */
.section-header{margin:28px 0 12px}
.section-header.first{margin-top:8px}
.section-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.section-eyebrow .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--green);color:#fff;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
.section-eyebrow .lbl{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.8px}
.section-eyebrow .pct{margin-left:auto;font-size:11px;font-weight:600;color:var(--text-light);font-variant-numeric:tabular-nums}
.section-title{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.3;margin-bottom:10px}
.section-bar{height:3px;background:var(--bg-3);border-radius:2px;overflow:hidden;margin-bottom:14px}
.section-bar .sb-fill{height:100%;background:var(--green);transition:width .3s;border-radius:2px}

/* Lista vertical de unidades, conectada por línea fina a la izquierda */
.unit-list{position:relative;padding-left:22px}
.unit-list:before{content:'';position:absolute;left:11px;top:14px;bottom:14px;width:1px;background:var(--line)}
.unit{position:relative;display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s var(--ease),box-shadow .18s var(--ease),transform .12s var(--ease);box-shadow:var(--shadow-sm);text-align:left;width:100%;min-height:64px}
.unit:hover{border-color:var(--line-2);box-shadow:var(--shadow);transform:translateY(-1px)}
.unit:active{transform:translateY(0)}
/* Indicador circular a la izquierda, sobre la línea vertical */
.unit:before{content:attr(data-n);position:absolute;left:-26px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid var(--bg-3);color:var(--text-light);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;z-index:1}
.unit.current:before{border-color:var(--green);background:var(--green);color:#fff;box-shadow:0 0 0 4px rgba(30,58,138,.12)}
.unit.done:before{content:'';background:var(--green);border-color:var(--green);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");background-size:14px;background-repeat:no-repeat;background-position:center}
.unit.locked{cursor:not-allowed;opacity:.6}
.unit.locked:hover{border-color:var(--line);box-shadow:var(--shadow-sm)}
.unit.locked:active{transform:none}
.unit.locked:before{background:var(--bg-2);border-color:var(--bg-3);color:var(--text-light)}
.unit-body{flex:1;min-width:0}
.unit-label{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;letter-spacing:-.01em;margin-bottom:2px}
.unit.locked .unit-label{color:var(--text-light)}
.unit-meta{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:500;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px}
.unit-meta .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;background:var(--bg-2);color:var(--text-light)}
.unit.current .unit-meta .badge.cta{background:var(--green);color:#fff}
.unit.done .unit-meta .badge.ok{background:#DCFCE7;color:#15803D}
.unit-chev{color:var(--text-light);display:flex;align-items:center}
.unit.locked .unit-chev{opacity:.5}

/* ===== LESSON ===== */
.lesson{flex:1;display:flex;flex-direction:column;padding:0}
.progress-bar-wrap{padding:14px 16px;display:flex;align-items:center;gap:12px}
.progress-bar{flex:1;height:10px;background:var(--bg-3);border-radius:8px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--green) 0%,var(--green-l) 100%);border-radius:8px;transition:width .3s}
.progress-close{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--r);color:var(--text-light);transition:background .15s var(--ease),color .15s var(--ease);cursor:pointer}
.progress-close:hover{background:var(--bg-2);color:var(--text)}
.lesson-content{flex:1;padding:22px 20px;display:flex;flex-direction:column}
.q-text{font-family:var(--font-display);font-size:21px;font-weight:700;line-height:1.35;margin-bottom:24px;flex-shrink:0;letter-spacing:-.022em;color:var(--text)}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;text-align:left;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;transition:border-color .15s var(--ease),box-shadow .18s var(--ease),background .15s var(--ease),transform .12s var(--ease),color .15s var(--ease);display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);min-height:54px;line-height:1.4}
.opt:hover{border-color:var(--line-2);box-shadow:var(--shadow);transform:translateY(-1px)}
.opt:active{transform:translateY(0)}
.opt-num{width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-light);font-weight:700;flex-shrink:0}
.opt.selected{border-color:var(--green);background:#EFF6FF;color:var(--green)}
.opt.selected .opt-num{border-color:var(--green);color:var(--green);background:#fff}
.opt.ok{border-color:#16A34A;background:#DCFCE7;color:#15803D}
.opt.ok .opt-num{border-color:#16A34A;color:#15803D;background:#fff}
.opt.bad{border-color:var(--red);background:#FEE2E2;color:var(--red-d)}
.opt.bad .opt-num{border-color:var(--red);color:var(--red);background:#fff}
.feedback{margin-top:auto;padding:18px 20px;border-top:1px solid var(--line);background:var(--bg)}
.feedback.ok{background:#DCFCE7;border-top-color:#16A34A}
.feedback.bad{background:#FEE2E2;border-top-color:var(--red)}
.feedback-title{font-size:15px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px;letter-spacing:-.01em}
.feedback.ok .feedback-title{color:#15803D}
.feedback.bad .feedback-title{color:var(--red-d)}
.feedback-explain{font-size:14px;font-weight:500;color:var(--text);line-height:1.55;margin-bottom:14px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;min-height:46px;padding:12px 16px;border-radius:var(--r-md);font-size:15px;font-weight:600;letter-spacing:-.005em;cursor:pointer;border:1px solid transparent;transition:transform .12s var(--ease),box-shadow .18s var(--ease),background .15s var(--ease),border-color .15s var(--ease),color .15s var(--ease)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--green);color:#fff;box-shadow:0 2px 4px rgba(30,58,138,.2),0 1px 2px rgba(30,58,138,.12)}
.btn.primary:hover{background:var(--green-d);box-shadow:0 4px 10px rgba(30,58,138,.28),0 2px 4px rgba(30,58,138,.15)}
.btn.danger{background:var(--red);color:#fff;box-shadow:0 2px 4px rgba(220,38,38,.18)}
.btn.danger:hover{background:var(--red-d);box-shadow:0 4px 10px rgba(220,38,38,.25)}
.btn.outline{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.btn.outline:hover{background:var(--bg-2);border-color:var(--line-2);color:var(--text)}
.btn.disabled{background:var(--bg-3);color:#94A3B8;cursor:not-allowed;box-shadow:none}
.btn.disabled:hover{background:var(--bg-3)}
.btn.disabled:active{transform:none}

/* ===== RESULT ===== */
.result{flex:1;padding:32px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.result-emoji{margin-bottom:18px;display:flex;align-items:center;justify-content:center;color:var(--text-light)}
.result-emoji.ok{color:#16A34A}
.result-emoji.fail{color:var(--orange-d)}
.result-title{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--green);margin-bottom:8px;letter-spacing:-.03em;line-height:1.15}
.result-title.fail{color:var(--red)}
.result-sub{font-size:14px;color:var(--text-light);margin-bottom:32px;font-weight:500}
.result-stats{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;justify-content:center}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px;min-width:120px;box-shadow:var(--shadow-sm)}
.stat-card .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;color:var(--text-light)}
.stat-card.xp .stat-label{color:var(--gold)}
.stat-card.acc .stat-label{color:var(--green)}
.stat-card.time .stat-label{color:var(--blue)}
.stat-card .stat-value{font-family:var(--font-display);font-size:24px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1}

/* ===== EMPTY / NO LIVES ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:#fff;width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:24px 22px;text-align:center;box-shadow:0 -8px 24px rgba(0,0,0,.12)}
.modal-emoji{margin-bottom:14px;display:flex;align-items:center;justify-content:center;color:var(--text-light)}
.modal-emoji.red{color:var(--red)}
.modal-title{font-family:var(--font-display);font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:-.025em;line-height:1.2}
.modal-text{font-size:14px;color:var(--text-light);font-weight:500;margin-bottom:20px;line-height:1.5}

/* ===== MASCOT (Foralín, el pájaro opositor) ===== */
.mascot-wrap{display:flex;align-items:flex-end;gap:10px;margin:0 0 18px 0;min-height:120px}
.mascot{width:108px;flex-shrink:0;animation:mascot-idle 3s ease-in-out infinite}
.mascot.bounce{animation:mascot-bounce .6s ease}
.mascot.shake{animation:mascot-shake .5s ease}
@keyframes mascot-idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes mascot-bounce{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-14px) rotate(-6deg)}60%{transform:translateY(-4px) rotate(4deg)}}
@keyframes mascot-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px) rotate(-3deg)}75%{transform:translateX(6px) rotate(3deg)}}
.mascot-bubble{position:relative;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--text);max-width:220px;line-height:1.4;box-shadow:var(--shadow)}
.mascot-bubble:before{content:'';position:absolute;left:-9px;bottom:14px;border:6px solid transparent;border-right-color:var(--line)}
.mascot-bubble:after{content:'';position:absolute;left:-7px;bottom:14px;border:6px solid transparent;border-right-color:#fff}
.mascot-bubble.ok{border-color:#16A34A;color:#15803D}
.mascot-bubble.ok:before{border-right-color:#16A34A}
.mascot-bubble.bad{border-color:var(--red);color:var(--red-d)}
.mascot-bubble.bad:before{border-right-color:var(--red)}

/* ===== EXAM CTA (banner en arbol) ===== */
.exam-cta{position:relative;display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#172554 0%,#1E3A8A 100%);color:#fff;padding:16px 18px;border-radius:var(--r-lg);margin:8px 0 20px;cursor:pointer;transition:transform .12s var(--ease),box-shadow .18s var(--ease);text-align:left;width:100%;box-shadow:0 4px 14px rgba(23,37,84,.22),0 1px 2px rgba(23,37,84,.14);overflow:hidden}
.exam-cta:before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 100% 0%, rgba(255,255,255,.10) 0%, transparent 50%);pointer-events:none}
.exam-cta:hover{box-shadow:0 8px 22px rgba(23,37,84,.3),0 2px 6px rgba(23,37,84,.15);transform:translateY(-1px)}
.exam-cta:active{transform:translateY(0)}
.exam-cta .ec-icon{flex-shrink:0;width:42px;height:42px;border-radius:var(--r);background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.16)}
.exam-cta .ec-body{flex:1;min-width:0;position:relative}
.exam-cta .ec-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:2px}
.exam-cta .ec-title{font-family:var(--font-display);font-size:16px;font-weight:700;line-height:1.2;margin-bottom:3px;letter-spacing:-.015em}

.splash{flex:1;background:radial-gradient(ellipse at 50% 35%, #1E40AF 0%, #1E3A8A 50%, #172554 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:40px 20px;position:relative;overflow:hidden;animation:splash-in .35s var(--ease);font-family:var(--font-body)}

.splash-bar{width:180px;height:3px;background:rgba(255,255,255,.18);border-radius:6px;overflow:hidden;margin-top:48px;z-index:1;animation:splash-fadein .55s var(--ease) .4s both}

function ic(name, cls=''){
  const path = ICONS[name];
  if(!path) return '';
  return `<svg class="ico ${cls}" viewBox="0 0 24 24" aria-hidden="true">${path}</svg>`;
}

function regenLives(){
  if(state.vidas>=5) return;
  if(!state.vidasReset) return;
  const now = Date.now();
  const elapsedMin = Math.floor((now - state.vidasReset)/60000);
  const regen = Math.floor(elapsedMin/30);
  if(regen>0){
    state.vidas = Math.min(5, state.vidas+regen);
    state.vidasReset = state.vidas>=5 ? null : state.vidasReset + regen*30*60000;
    STATE.save(state);
  }
}

function bumpRacha(){
  const today = new Date().toISOString().slice(0,10);
  if(state.ultimoDia === today) return;
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  state.racha = state.ultimoDia === yesterday ? state.racha+1 : 1;
  state.ultimoDia = today;
  STATE.save(state);
}

// ============ ROUTER ============
const app = document.getElementById('app');

function render(view, ctx){
  if(window._examTimer && view!=='exam'){ clearInterval(window._examTimer); window._examTimer = null; }
  regenLives();
  app.innerHTML = '';
  if(view==='splash') renderSplash();
  else if(view==='onb') renderOnboarding();
  else if(view==='tree') renderTree();
  else if(view==='lesson') renderLesson(ctx);
  else if(view==='result') renderResult(ctx);
  else if(view==='examConfig') renderExamConfig();
  else if(view==='exam') renderExam(ctx);
  else if(view==='examResult') renderExamResult(ctx);
}

// ============ TREE ============
function getOpo(){ return OPOSICIONES.find(o=>o.id===state.oposicion); }

function renderTree(){
  const op = getOpo();
  if(!op){ render('onb'); return; }
  let currentMarked = false; // marcamos solo la PRIMERA unidad pendiente como "current"
  const sectionsHTML = op.secciones.map((sec,si)=>{
    let done=0, total=sec.unidades.length;
    sec.unidades.forEach(u=>{ if(state.progreso[u.id]?.completed) done++; });
    const pct = total? Math.round(done/total*100):0;
    const unitsHTML = sec.unidades.map((u,i)=>{
      const prog = state.progreso[u.id] || {stars:0, completed:false};
      let cls = '';
      if(prog.completed) cls = 'done';
      else if(i>0 && !state.progreso[sec.unidades[i-1].id]?.completed && !state.progreso[u.id]) cls = 'locked';
      const isCurrent = !prog.completed && cls!=='locked' && !currentMarked;
      if(isCurrent){ cls += ' current'; currentMarked = true; }
      const qCount = (window.PREGUNTAS||[]).filter(p=>p.unidad===u.id).length;
      const metaBadge = prog.completed
        ? `<span class="badge ok">${ic('check','ico-sm')}Completado</span>`
        : (cls.includes('locked')
            ? `<span class="badge">${ic('lock','ico-sm')}Bloqueado</span>`
            : (isCurrent
                ? `<span class="badge cta">Empezar</span>`
                : `<span class="badge">Pendiente</span>`));
      return `
        <button class="unit ${cls}" data-uid="${u.id}" data-n="${i+1}">
          <div class="unit-body">
            <div class="unit-label">${u.nombre}</div>
            <div class="unit-meta">${metaBadge}<span>${qCount} preguntas</span></div>
          </div>
          <div class="unit-chev">${ic('chevronRight','ico-md')}</div>
        </button>
      `;
    }).join('');
    return `
      <div class="section-header ${si===0?'first':''}">
        <div class="section-eyebrow">
          <span class="num">${si+1}</span>
          <span class="lbl">Sección</span>
          <span class="pct">${done}/${total} · ${pct}%</span>
        </div>
        <div class="section-title">${sec.nombre}</div>
        <div class="section-bar"><div class="sb-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="unit-list">${unitsHTML}</div>
    `;
  }).join('');

  const totalPool = (window.PREGUNTAS||[]).filter(p=>op.secciones.some(s=>s.unidades.some(u=>u.id===p.unidad))).length;
  const ultimoExam = (state.examenes||[]).slice().reverse().find(e=>e.opo===op.id);
  const examSubtitle = ultimoExam
    ? `Última nota: <b>${ultimoExam.nota.toFixed(1)}/10</b> · ${ultimoExam.aciertos}/${ultimoExam.total} aciertos`
    : `50 preguntas · 60 min · regla 3:1`;
  const examEnabled = totalPool >= 50;
  app.innerHTML = `
    ${topBar('exit')}
    <div class="tree">
      <div class="tree-head">
        <div class="tree-title">${op.nombre}</div>
        <div class="tree-org">${op.organismo}</div>
      </div>
      <button class="exam-cta" id="exam-cta" ${examEnabled?'':'disabled style="opacity:.55;cursor:not-allowed"'}>
        <div class="ec-icon">${ic('fileCheck','ico-md')}</div>
        <div class="ec-body">
          <div class="ec-eyebrow">${examEnabled?'Simulacro oficial':'Bloqueado'}</div>
          <div class="ec-title">${examEnabled?'Hacer examen completo':'Simulacro (próximamente)'}</div>
          <div class="ec-sub">${examEnabled?examSubtitle:`Faltan preguntas: hay ${totalPool}/50 mínimo`}</div>
        </div>
        <div class="ec-arrow">${ic('arrowRight','ico-md')}</div>
      </button>
      ${sectionsHTML}
    </div>
  `;
  if(examEnabled){
    document.getElementById('exam-cta').onclick = ()=>render('examConfig');
  }
  document.getElementById('exit').onclick = ()=>{
    if(!confirm('¿Salir y elegir otra oposición?\nTu progreso se guarda igual.')) return;
    state.oposicion = null;
    STATE.save(state);
    render('onb');
  };
  document.querySelectorAll('.unit:not(.locked)').forEach(el=>{
    el.onclick = ()=>{
      const uid = el.dataset.uid;
      startLesson(uid);
    };
  });
}

// ============ LESSON ============
function startLesson(unitId){
  if(state.vidas<=0){
    showNoLivesModal();
    return;
  }
  const pool = PREGUNTAS.filter(p=>p.unidad===unitId);
  if(pool.length===0){
    alert('Esta unidad aún no tiene preguntas. Próximamente.');
    return;
  }
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  const N = Math.min(5, shuffled.length);
  const ctx = {
    unitId,
    questions: shuffled.slice(0,N),
    idx: 0,
    correct: 0,
    wrong: 0,
    selectedIdx: null,
    answered: false,
    startTime: Date.now()
  };
  render('lesson', ctx);
}

function renderLesson(ctx){
  const q = ctx.questions[ctx.idx];
  const pct = Math.round(ctx.idx/ctx.questions.length*100);
  app.innerHTML = `
    <div class="lesson">
      <div class="progress-bar-wrap">
        <button class="progress-close" id="quit" aria-label="Salir">${ic('x','ico-md')}</button>
        <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
        <span class="topbar-stat lives" style="font-size:13px;gap:4px">${ic('heart','ico-sm')}${state.vidas}</span>
      </div>
      <div class="lesson-content">
        <div class="mascot-wrap">
          <div class="mascot" id="mascot">${mascotSVG()}</div>
          <div class="mascot-bubble" id="mascot-bubble">${pick(MASCOT_LINES.start)}</div>
        </div>
        <div class="q-text">${q.pregunta}</div>
        <div class="options" id="options">
          ${q.opciones.map((o,i)=>`
            <button class="opt" data-i="${i}">
              <div class="opt-num">${String.fromCharCode(65+i)}</div>
              <div>${o}</div>
            </button>
          `).join('')}
        </div>
      </div>
      <div id="action-bar" style="padding:18px 20px;border-top:2px solid var(--line)">
        <button class="btn disabled" id="check">Comprobar</button>
      </div>
    </div>
  `;
  document.getElementById('quit').onclick = ()=>{ if(confirm('¿Salir de la lección? Perderás el progreso.')) render('tree'); };
  document.querySelectorAll('.opt').forEach(b=>{
    b.onclick = ()=>{
      if(ctx.answered) return;
      ctx.selectedIdx = +b.dataset.i;
      document.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
      const btn = document.getElementById('check');
      btn.classList.remove('disabled');
      btn.classList.add('primary');
    };
  });
  document.getElementById('check').onclick = ()=>{
    if(ctx.selectedIdx===null) return;
    if(ctx.answered) return nextQ(ctx);
    answerQ(ctx);
  };
}

function answerQ(ctx){
  const q = ctx.questions[ctx.idx];
  const ok = ctx.selectedIdx === q.correcta;
  ctx.answered = true;
  if(ok){ ctx.correct++; state.xp += 10; }
  else{
    ctx.wrong++;
    state.vidas = Math.max(0, state.vidas-1);
    if(state.vidas===0) state.vidasReset = Date.now();
    else if(!state.vidasReset) state.vidasReset = Date.now();
  }
  STATE.save(state);

  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.classList.remove('selected');
    if(i===q.correcta) b.classList.add('ok');
    if(i===ctx.selectedIdx && !ok) b.classList.add('bad');
  });

  const mascot = document.getElementById('mascot');
  const bubble = document.getElementById('mascot-bubble');
  if(mascot && bubble){
    mascot.classList.remove('bounce','shake');
    void mascot.offsetWidth;
    mascot.classList.add(ok?'bounce':'shake');
    bubble.classList.remove('ok','bad');
    bubble.classList.add(ok?'ok':'bad');
    bubble.textContent = pick(ok?MASCOT_LINES.ok:MASCOT_LINES.bad);
  }

  const ab = document.getElementById('action-bar');
  ab.innerHTML = `
    <div class="feedback ${ok?'ok':'bad'}" style="margin:0;padding:14px 16px;border-radius:12px;border-top:0">
      <div class="feedback-title">${ic(ok?'checkCircle':'xCircle','ico-md')}<span>${ok?'Correcto':'Incorrecto'}</span></div>
      <div class="feedback-explain">${q.explicacion||''}</div>
      <button class="btn ${ok?'primary':'danger'}" id="next">Continuar</button>
    </div>
  `;
  document.getElementById('next').onclick = ()=>nextQ(ctx);

  if(state.vidas===0){
    setTimeout(()=>showNoLivesModal(), 800);
  }
}

function nextQ(ctx){
  ctx.idx++;
  ctx.selectedIdx = null;
  ctx.answered = false;
  if(ctx.idx >= ctx.questions.length){
    finishLesson(ctx);
  } else {
    renderLesson(ctx);
  }
}

function finishLesson(ctx){
  const total = ctx.questions.length;
  const acc = Math.round(ctx.correct/total*100);
  const passed = ctx.correct >= Math.ceil(total*0.6);
  if(passed){
    state.progreso[ctx.unitId] = {completed:true, stars:acc>=90?3:acc>=70?2:1};
    state.xp += 20;
    bumpRacha();
    STATE.save(state);
  }
  render('result', {ctx, passed, acc, time: Math.round((Date.now()-ctx.startTime)/1000)});
}

// ============ RESULT ============
function renderResult({ctx, passed, acc, time}){
  app.innerHTML = `
    <div class="result">
      <div class="result-emoji ${passed?'ok':'fail'}">${ic(passed?'checkCircle':'refresh','ico-2xl')}</div>
      <div class="result-title ${passed?'':'fail'}">${passed?'Lección completada':'Inténtalo de nuevo'}</div>
      <div class="result-sub">${passed?'Has dominado este tema':'Necesitas al menos 60% de aciertos'}</div>
      <div class="result-stats">
        <div class="stat-card xp"><div class="stat-label">XP</div><div class="stat-value">+${ctx.correct*10 + (passed?20:0)}</div></div>
        <div class="stat-card acc"><div class="stat-label">Aciertos</div><div class="stat-value">${acc}%</div></div>
        <div class="stat-card time"><div class="stat-label">Tiempo</div><div class="stat-value">${time}s</div></div>
      </div>
      <button class="btn primary" id="continue" style="max-width:300px">Continuar</button>
    </div>
  `;
  document.getElementById('continue').onclick = ()=>render('tree');
}

// ============ EXAM ============
const EXAM_CFG = { N: 50, MIN_SEG: 60*60, PEN: 3 }; // 50 preguntas, 60 min, 3 fallos = 1 acierto

let examConfigDraft = null; // { modo:'mix'|'temas', unidades:Set<string> }

function getOpoUnidades(op){
  const out = [];
  op.secciones.forEach(s=>{
    s.unidades.forEach(u=>{
      const count = (window.PREGUNTAS||[]).filter(p=>p.unidad===u.id).length;
      out.push({ ...u, secNombre: s.nombre, secColor: s.color, secEmoji: s.emoji, count });
    });
  });
  return out;
}

function poolForExam(op, modo, unidadesSet){
  const allowed = new Set();
  op.secciones.forEach(s=>s.unidades.forEach(u=>{
    if(modo==='mix' || unidadesSet.has(u.id)) allowed.add(u.id);
  }));
  return (window.PREGUNTAS||[]).filter(p=>allowed.has(p.unidad));
}

function renderExamConfig(){
  const op = getOpo();
  if(!op){ render('onb'); return; }
  if(!examConfigDraft || examConfigDraft._opo !== op.id){
    examConfigDraft = { _opo: op.id, modo: 'mix', unidades: new Set() };
  }
  const unidades = getOpoUnidades(op);
  const totalGlobal = unidades.reduce((s,u)=>s+u.count, 0);

  // Agrupar por seccion para el listado
  const seccionesHTML = op.secciones.map(sec=>{
    const us = unidades.filter(u=>sec.unidades.some(x=>x.id===u.id));
    const rows = us.map(u=>{
      const sel = examConfigDraft.unidades.has(u.id);
      return `
        <div class="topic-row ${sel?'sel':''}" data-uid="${u.id}">
          <div class="cb"></div>
          <div class="ti">${u.icono}</div>
          <div class="tn">${u.nombre}</div>
          <div class="tc">${u.count}</div>
        </div>
      `;
    }).join('');
    return `<div class="section-name">${sec.emoji} ${sec.nombre}</div>${rows}`;
  }).join('');

  app.innerHTML = `
    ${topBar('none')}
    <div class="exam-cfg">
      <h2 style="display:flex;align-items:center;gap:10px">${ic('fileCheck','ico-lg')}Simulacro de examen</h2>
      <div class="sub">${op.nombre}</div>
      <div class="info" style="display:flex;align-items:flex-start;gap:8px">${ic('clock','ico-sm')}<span><b>50 preguntas</b> en <b>60 minutos</b>. Penalización: <b>3 fallos = 1 acierto</b>. Las preguntas en blanco no penalizan. Apto a partir de <b>5/10</b>.</span></div>

      <div class="mode-card ${examConfigDraft.modo==='mix'?'sel':''}" id="mode-mix">
        <div class="radio"></div>
        <div>
          <div class="mc-title">Mix global</div>
          <div class="mc-sub">50 preguntas aleatorias de todo el temario (${totalGlobal} disponibles)</div>
        </div>
      </div>
      <div class="mode-card ${examConfigDraft.modo==='temas'?'sel':''}" id="mode-temas">
        <div class="radio"></div>
        <div>
          <div class="mc-title">Por temas</div>
          <div class="mc-sub">Tu eliges los temas. Util para repasar bloques concretos.</div>
        </div>
      </div>

      <div id="topics-block" style="display:${examConfigDraft.modo==='temas'?'block':'none'}">
        <div class="topics-actions">
          <button id="t-all">Marcar todo</button>
          <button id="t-none">Quitar todo</button>
        </div>
        <div class="topics-wrap" id="topics">${seccionesHTML}</div>
      </div>

      <div class="pool-info" id="pool-info"></div>

      <div class="actions">
        <button class="btn btn-exam primary" id="start-exam">Empezar examen</button>
        <button class="btn outline" id="back-exam">Volver al arbol</button>
      </div>
    </div>
  `;

  function refreshPool(){
    const pool = poolForExam(op, examConfigDraft.modo, examConfigDraft.unidades);
    const el = document.getElementById('pool-info');
    const startBtn = document.getElementById('start-exam');
    if(pool.length < EXAM_CFG.N){
      el.classList.add('warn');
      el.innerHTML = `Solo hay <b>${pool.length}</b> preguntas en la seleccion. Necesitas al menos <b>${EXAM_CFG.N}</b>.`;
      startBtn.classList.add('disabled');
      startBtn.classList.remove('primary');
    } else {
      el.classList.remove('warn');
      el.innerHTML = `<b>${pool.length}</b> preguntas en la seleccion. Se eligiran ${EXAM_CFG.N} al azar.`;
      startBtn.classList.remove('disabled');
      startBtn.classList.add('primary');
    }
  }
  refreshPool();

  document.getElementById('mode-mix').onclick = ()=>{ examConfigDraft.modo='mix'; renderExamConfig(); };
  document.getElementById('mode-temas').onclick = ()=>{ examConfigDraft.modo='temas'; renderExamConfig(); };
  document.getElementById('back-exam').onclick = ()=>render('tree');

  document.querySelectorAll('.topic-row').forEach(r=>{
    r.onclick = ()=>{
      const uid = r.dataset.uid;
      if(examConfigDraft.unidades.has(uid)) examConfigDraft.unidades.delete(uid);
      else examConfigDraft.unidades.add(uid);
      r.classList.toggle('sel');
      refreshPool();
    };
  });

  const tAll = document.getElementById('t-all');
  const tNone = document.getElementById('t-none');
  if(tAll) tAll.onclick = ()=>{ unidades.forEach(u=>{ if(u.count>0) examConfigDraft.unidades.add(u.id); }); renderExamConfig(); };
  if(tNone) tNone.onclick = ()=>{ examConfigDraft.unidades.clear(); renderExamConfig(); };

  document.getElementById('start-exam').onclick = ()=>{
    const pool = poolForExam(op, examConfigDraft.modo, examConfigDraft.unidades);
    if(pool.length < EXAM_CFG.N) return;
    if(examConfigDraft.modo==='temas' && examConfigDraft.unidades.size===0) return;
    if(!confirm(`¿Empezar simulacro?\n\n${EXAM_CFG.N} preguntas en ${EXAM_CFG.MIN_SEG/60} min.\nNo se pierden vidas.`)) return;
    startExam(pool);
  };
}

function startExam(pool){
  const shuffled = [...pool].sort(()=>Math.random()-0.5).slice(0, EXAM_CFG.N);
  const ctx = {
    questions: shuffled,
    idx: 0,
    respuestas: new Array(shuffled.length).fill(null),
    marcadas: new Array(shuffled.length).fill(false),
    inicioTs: Date.now(),
    tiempoRestante: EXAM_CFG.MIN_SEG,
    modo: examConfigDraft.modo,
    unidades: examConfigDraft.modo==='temas' ? Array.from(examConfigDraft.unidades) : null,
    finalizado: false
  };
  render('exam', ctx);
}

function fmtTimer(s){
  const m = Math.floor(s/60);
  const ss = s%60;
  return `${m.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
}

function renderExam(ctx){
  const q = ctx.questions[ctx.idx];
  const total = ctx.questions.length;
  const respondidas = ctx.respuestas.filter(r=>r!==null).length;

  const cellsHTML = ctx.questions.map((_,i)=>{
    const cls = [];
    if(ctx.respuestas[i]!==null) cls.push('done');
    if(ctx.marcadas[i]) cls.push('mark');
    if(i===ctx.idx) cls.push('cur');
    return `<button class="exam-cell ${cls.join(' ')}" data-i="${i}">${i+1}</button>`;
  }).join('');

  const optsHTML = q.opciones.map((o,i)=>{
    const sel = ctx.respuestas[ctx.idx] === i;
    return `
      <button class="exam-opt ${sel?'selected':''}" data-i="${i}">
        <div class="opt-num">${String.fromCharCode(65+i)}</div>
        <div>${o}</div>
      </button>
    `;
  }).join('');

  const isLast = ctx.idx === total-1;
  const isFirst = ctx.idx === 0;
  const marked = ctx.marcadas[ctx.idx];

  app.innerHTML = `
    <div class="exam">
      <div class="exam-bar">
        <div class="exam-timer" id="timer">${ic('clock','ico-sm')}<span>${fmtTimer(ctx.tiempoRestante)}</span></div>
        <div class="exam-counter">Pregunta <b>${ctx.idx+1}</b> / ${total} &middot; respondidas <b>${respondidas}</b></div>
        <button class="exam-quit" id="quit-exam">Salir</button>
      </div>
      <div class="exam-body">
        <div class="exam-num">Pregunta ${ctx.idx+1}</div>
        <div class="exam-q">${q.pregunta}</div>
        <div class="exam-opts">${optsHTML}</div>
        <button class="exam-mark ${marked?'on':''}" id="mark"><span class="mb">${marked?ic('star','ico-sm'):''}</span> Marcar para revisar</button>
      </div>
      <div class="exam-grid-wrap">
        <h4>Navegación (${respondidas}/${total} respondidas)</h4>
        <div class="exam-grid">${cellsHTML}</div>
      </div>
      <div class="exam-foot">
        <button class="btn outline ${isFirst?'disabled':''}" id="prev" style="display:flex;align-items:center;justify-content:center;gap:6px"><span style="transform:rotate(180deg);display:inline-flex">${ic('chevronRight','ico-sm')}</span>Anterior</button>
        ${isLast
          ? `<button class="btn danger" id="finish">Finalizar</button>`
          : `<button class="btn btn-exam primary" id="next" style="display:flex;align-items:center;justify-content:center;gap:6px">Siguiente${ic('chevronRight','ico-sm')}</button>`}
      </div>
    </div>
  `;

  // Timer (1 unico interval por sesion)
  if(window._examTimer){ clearInterval(window._examTimer); }
  window._examTimer = setInterval(()=>{
    if(ctx.finalizado){ clearInterval(window._examTimer); window._examTimer=null; return; }
    ctx.tiempoRestante = Math.max(0, ctx.tiempoRestante - 1);
    const t = document.getElementById('timer');
    if(t){
      t.innerHTML = `${ic('clock','ico-sm')}<span>${fmtTimer(ctx.tiempoRestante)}</span>`;
      t.classList.toggle('warn', ctx.tiempoRestante<=300 && ctx.tiempoRestante>60);
      t.classList.toggle('danger', ctx.tiempoRestante<=60);
    }
    if(ctx.tiempoRestante<=0){
      clearInterval(window._examTimer); window._examTimer=null;
      finishExam(ctx, true);
    }
  }, 1000);

  document.querySelectorAll('.exam-opt').forEach(b=>{
    b.onclick = ()=>{
      const i = +b.dataset.i;
      ctx.respuestas[ctx.idx] = (ctx.respuestas[ctx.idx]===i) ? null : i;
      renderExam(ctx);
    };
  });
  document.querySelectorAll('.exam-cell').forEach(c=>{
    c.onclick = ()=>{ ctx.idx = +c.dataset.i; renderExam(ctx); };
  });
  document.getElementById('mark').onclick = ()=>{
    ctx.marcadas[ctx.idx] = !ctx.marcadas[ctx.idx];
    renderExam(ctx);
  };
  const prev = document.getElementById('prev');
  if(prev) prev.onclick = ()=>{ if(ctx.idx>0){ ctx.idx--; renderExam(ctx); } };
  const next = document.getElementById('next');
  if(next) next.onclick = ()=>{ if(ctx.idx<total-1){ ctx.idx++; renderExam(ctx); } };
  const fin = document.getElementById('finish');
  if(fin) fin.onclick = ()=>{
    const sinResp = ctx.respuestas.filter(r=>r===null).length;
    const msg = sinResp>0
      ? `Te quedan ${sinResp} preguntas en blanco.\n¿Finalizar de todos modos?`
      : `¿Finalizar el examen?`;
    if(confirm(msg)) finishExam(ctx, false);
  };
  document.getElementById('quit-exam').onclick = ()=>{
    if(confirm('¿Salir del examen? Se perdera el progreso del simulacro.')){
      ctx.finalizado = true;
      if(window._examTimer){ clearInterval(window._examTimer); window._examTimer=null; }
      render('tree');
    }
  };
}

function finishExam(ctx, porTiempo){
  ctx.finalizado = true;
  if(window._examTimer){ clearInterval(window._examTimer); window._examTimer=null; }
  const total = ctx.questions.length;
  let aciertos=0, fallos=0, blancos=0;
  ctx.questions.forEach((q,i)=>{
    const r = ctx.respuestas[i];
    if(r===null) blancos++;
    else if(r===q.correcta) aciertos++;
    else fallos++;
  });
  const netos = aciertos - fallos/EXAM_CFG.PEN;
  const nota = Math.max(0, (netos/total)*10);
  const tiempoSeg = Math.round((Date.now()-ctx.inicioTs)/1000);
  const apto = nota >= 5;

  // Histroico
  const op = getOpo();
  state.examenes = state.examenes || [];
  state.examenes.push({
    ts: Date.now(),
    opo: op?.id || null,
    modo: ctx.modo,
    unidades: ctx.unidades,
    total, aciertos, fallos, blancos,
    nota: Math.round(nota*10)/10,
    tiempoSeg,
    apto,
    porTiempo: !!porTiempo
  });
  // Bonus XP
  state.xp += aciertos*5 + (apto ? 100 : 0);
  if(apto) bumpRacha();
  STATE.save(state);

  render('examResult', { ctx, total, aciertos, fallos, blancos, nota, tiempoSeg, apto, porTiempo });
}

function renderExamResult(r){
  const { ctx, total, aciertos, fallos, blancos, nota, tiempoSeg, apto, porTiempo } = r;
  const notaStr = nota.toFixed(1).replace('.', ',');
  const min = Math.floor(tiempoSeg/60);
  const sec = tiempoSeg%60;

  const fallosArr = ctx.questions.map((q,i)=>{
    const resp = ctx.respuestas[i];
    return { q, i, resp };
  }).filter(x => x.resp===null || x.resp!==x.q.correcta);

  const revHTML = fallosArr.map(x=>{
    const blank = x.resp===null;
    const yourLine = blank
      ? `<div class="rev-line bl"><span class="lab">Sin responder</span></div>`
      : `<div class="rev-line ko"><span class="lab">Tu</span> ${String.fromCharCode(65+x.resp)}. ${x.q.opciones[x.resp]}</div>`;
    return `
      <div class="rev ${blank?'bl':''}">
        <div class="rev-q">${x.i+1}. ${x.q.pregunta}</div>
        ${yourLine}
        <div class="rev-line ok"><span class="lab">Correcta</span> ${String.fromCharCode(65+x.q.correcta)}. ${x.q.opciones[x.q.correcta]}</div>
        ${x.q.explicacion?`<div class="rev-exp">${x.q.explicacion}</div>`:''}
      </div>
    `;
  }).join('') || `<div style="text-align:center;color:var(--text-light);font-weight:800;padding:14px">Sin fallos. ¡Perfecto!</div>`;

  const verdictTitle = apto ? '¡Apto!' : 'No apto';
  const verdictSub = porTiempo
    ? 'Se acabo el tiempo'
    : (apto ? 'Has superado el simulacro' : 'Necesitas un 5/10 para aprobar');
  const verdictIcon = apto ? 'trophy' : 'refresh';

  app.innerHTML = `
    ${topBar('none')}
    <div class="exam-res">
      <div class="verdict">
        <div class="verdict-emoji ${apto?'apto':'no'}">${ic(verdictIcon,'ico-2xl')}</div>
        <div class="verdict-title ${apto?'apto':'no'}">${verdictTitle}</div>
        <div class="verdict-sub">${verdictSub}</div>
      </div>
      <div class="nota-circle ${apto?'apto':'no'}">
        <div class="nota-num">${notaStr}</div>
        <div class="nota-de">/ 10</div>
        <div class="nota-cap">${apto?'Apto':'No apto'}</div>
      </div>
      <div class="stat-row">
        <div class="stat ok"><div class="lbl">Aciertos</div><div class="val">${aciertos}</div></div>
        <div class="stat ko"><div class="lbl">Fallos</div><div class="val">${fallos}</div></div>
        <div class="stat bl"><div class="lbl">Blanco</div><div class="val">${blancos}</div></div>
        <div class="stat tm"><div class="lbl">Tiempo</div><div class="val">${min}:${sec.toString().padStart(2,'0')}</div></div>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--text-light);font-weight:700;margin-bottom:8px">
        ${aciertos} aciertos &minus; ${fallos}/${EXAM_CFG.PEN} = <b>${(aciertos - fallos/EXAM_CFG.PEN).toFixed(2)}</b> netos sobre ${total}
      </div>
      <div class="actions">
        <button class="btn btn-exam primary" id="r-again">Hacer otro simulacro</button>
        <button class="btn outline" id="r-tree">Volver al arbol</button>
      </div>
      <div class="review-h">Revision (${fallosArr.length})</div>
      ${revHTML}
    </div>
  `;
  document.getElementById('r-again').onclick = ()=>render('examConfig');
  document.getElementById('r-tree').onclick = ()=>render('tree');
}

// ============ NO LIVES MODAL ============
function showNoLivesModal(){
  const minutes = state.vidasReset ? Math.max(1, 30 - Math.floor((Date.now()-state.vidasReset)/60000)) : 30;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-emoji red">${ic('heartCrack','ico-2xl')}</div>
      <div class="modal-title">Sin vidas</div>
      <div class="modal-text">Recuperarás una vida en unos ${minutes} min.<br>Mientras tanto repasa los temas que ya hiciste.</div>
      <button class="btn primary" id="m-ok">Entendido</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#m-ok').onclick = ()=>{
    overlay.remove();
    render('tree');
  };
}

// ============ INIT ============
function init(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
  render('splash');
}
init();
</script>
