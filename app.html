<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TestForal · Hacienda Bizkaia</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-512.png">
<meta name="theme-color" content="#58CC02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TestForal">
<link rel="apple-touch-icon" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --green:#58CC02; --green-d:#58A700; --green-l:#89E219;
  --orange:#FF9600; --orange-d:#E08600;
  --red:#FF4B4B; --red-d:#EA2B2B;
  --blue:#1CB0F6; --blue-d:#0E8DCB;
  --purple:#CE82FF; --purple-d:#B45EFF;
  --gold:#FFC800;
  --bg:#FFFFFF; --bg-2:#F7F7F7; --bg-3:#E5E5E5;
  --text:#3C3C3C; --text-light:#777;
  --line:#E5E5E5;
}
html,body{height:100%;font-family:'Nunito',sans-serif;color:var(--text);overscroll-behavior:none}
body{-webkit-user-select:none;user-select:none;background-color:#fff;background-image:linear-gradient(180deg,#C7F4A0 0%,#E1FBC9 22%,#F4FFE8 45%,#FFFFFF 70%);background-attachment:fixed;background-repeat:no-repeat}
button{font-family:inherit;border:none;cursor:pointer;background:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:transparent;position:relative}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.06);background:rgba(255,255,255,.78);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);position:sticky;top:0;z-index:10}
.topbar-stat{display:flex;align-items:center;gap:6px;font-weight:800;font-size:18px}
.topbar-stat .icon{font-size:22px}
.topbar-stat.streak{color:var(--orange)}
.topbar-stat.lives{color:var(--red)}
.topbar-stat.gem{color:var(--blue)}
.topbar-back{font-size:24px;color:var(--text-light);padding:4px 10px;font-weight:800}
.btn-exit{display:inline-flex;align-items:center;gap:6px;background:#fff;border:2px solid var(--line);border-bottom-width:3px;border-radius:12px;padding:6px 12px;font-size:13px;font-weight:900;color:var(--text-light);cursor:pointer;text-transform:uppercase;letter-spacing:.4px}
.btn-exit:active{transform:translateY(2px);border-bottom-width:1px}
.btn-exit .ic{font-size:15px}

/* ===== ONBOARDING (estilo Duolingo) ===== */
.onb{padding:14px 20px 28px;flex:1;display:flex;flex-direction:column}
.onb-mascot{display:flex;align-items:flex-start;gap:10px;margin:6px 0 22px}
.onb-mascot .m{width:130px;flex-shrink:0;animation:mascot-idle 3s ease-in-out infinite}
.onb-mascot .b{position:relative;background:#fff;border:2px solid var(--line);border-bottom-width:3px;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:800;color:var(--text);line-height:1.35;margin-top:30px;flex:1}
.onb-mascot .b:before{content:'';position:absolute;left:-10px;top:18px;border:7px solid transparent;border-right-color:var(--line)}
.onb-mascot .b:after{content:'';position:absolute;left:-7px;top:18px;border:7px solid transparent;border-right-color:#fff}
.onb-grid{display:grid;grid-template-columns:1fr;gap:12px}
.opo-card{background:#fff;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:14px;cursor:pointer;transition:transform .1s;display:flex;align-items:center;gap:14px;text-align:left}
.opo-card:active{transform:translateY(2px);border-bottom-width:2px}
.opo-card.disabled{opacity:.5;cursor:not-allowed}
.opo-card.disabled:active{transform:none;border-bottom-width:4px}
.opo-icon{width:44px;height:44px;border-radius:10px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.opo-body{flex:1;min-width:0}
.opo-card .opo-title{font-size:15px;font-weight:900;line-height:1.2;margin-bottom:3px}
.opo-card .opo-org{font-size:11px;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.opo-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;margin-top:6px}
.opo-pill.live{background:#D7FFB8;color:var(--green-d)}
.opo-pill.soon{background:#FFE5B0;color:var(--orange-d)}
.opo-lock{font-size:18px;color:var(--text-light)}

/* ===== TREE ===== */
.tree{padding:12px 20px 100px;flex:1}
.section-header{margin:24px 0 16px;text-align:center}
.section-header.first{margin-top:8px}
.section-banner{background:var(--green);color:#fff;padding:14px 18px;border-radius:14px;display:flex;align-items:center;gap:12px;border-bottom:4px solid var(--green-d);font-weight:900}
.section-banner .emoji{font-size:32px}
.section-banner .title{font-size:14px;text-transform:uppercase;opacity:.85;letter-spacing:.5px}
.section-banner .sub{font-size:18px}
.unit-row{display:flex;justify-content:center;margin:14px 0;position:relative}
.unit-row.r0{justify-content:center}
.unit-row.r1{justify-content:flex-start;padding-left:25%}
.unit-row.r2{justify-content:flex-end;padding-right:25%}
.unit-row.r3{justify-content:flex-start;padding-left:15%}
.unit-row.r4{justify-content:flex-end;padding-right:15%}
.unit{position:relative;text-align:center}
.unit-btn{width:84px;height:84px;border-radius:50%;background:var(--green);border-bottom:6px solid var(--green-d);display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;cursor:pointer;transition:transform .1s;box-shadow:0 0 0 0 transparent}
.unit-btn:active{transform:translateY(3px);border-bottom-width:3px}
.unit.locked .unit-btn{background:var(--bg-3);border-bottom-color:#A0A0A0;color:#fff;cursor:not-allowed}
.unit.locked .unit-btn:active{transform:none;border-bottom-width:6px}
.unit.done .unit-btn{background:var(--gold);border-bottom-color:#D4A700}
.unit-label{margin-top:8px;font-size:12px;font-weight:800;color:var(--text);max-width:130px;line-height:1.25}
.unit.locked .unit-label{color:var(--text-light)}
.unit-bubble{position:absolute;top:-44px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid var(--green);color:var(--green);padding:6px 12px;border-radius:18px;font-size:11px;font-weight:900;text-transform:uppercase;white-space:nowrap;border-bottom-width:3px}
.unit-bubble:after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--green)}

/* ===== LESSON ===== */
.lesson{flex:1;display:flex;flex-direction:column;padding:0}
.progress-bar-wrap{padding:14px 16px;display:flex;align-items:center;gap:12px}
.progress-bar{flex:1;height:14px;background:var(--bg-3);border-radius:8px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--green);border-radius:8px;transition:width .3s;box-shadow:inset 0 -3px 0 var(--green-d)}
.progress-close{font-size:22px;color:var(--text-light);font-weight:900;padding:0 8px}
.lesson-content{flex:1;padding:20px;display:flex;flex-direction:column}
.q-text{font-size:21px;font-weight:800;line-height:1.35;margin-bottom:24px;flex-shrink:0}
.options{display:flex;flex-direction:column;gap:12px}
.opt{background:#fff;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:14px 16px;text-align:left;font-size:16px;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.opt:active{transform:translateY(2px);border-bottom-width:2px}
.opt-num{width:30px;height:30px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-light);font-weight:800;flex-shrink:0}
.opt.selected{border-color:var(--blue);background:#DDF4FF;color:var(--blue-d)}
.opt.selected .opt-num{border-color:var(--blue);color:var(--blue);background:#fff}
.opt.ok{border-color:var(--green);background:#D7FFB8;color:var(--green-d)}
.opt.ok .opt-num{border-color:var(--green);color:var(--green);background:#fff}
.opt.bad{border-color:var(--red);background:#FFDFE0;color:var(--red-d)}
.opt.bad .opt-num{border-color:var(--red);color:var(--red);background:#fff}
.feedback{margin-top:auto;padding:18px 20px;border-top:2px solid var(--line);background:var(--bg)}
.feedback.ok{background:#D7FFB8;border-top-color:var(--green-l)}
.feedback.bad{background:#FFDFE0;border-top-color:var(--red)}
.feedback-title{font-size:18px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.feedback.ok .feedback-title{color:var(--green-d)}
.feedback.bad .feedback-title{color:var(--red-d)}
.feedback-explain{font-size:14px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:14px}
.btn{display:block;width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border-bottom:4px solid transparent;transition:transform .1s}
.btn:active{transform:translateY(2px);border-bottom-width:2px}
.btn.primary{background:var(--green);color:#fff;border-bottom-color:var(--green-d)}
.btn.danger{background:var(--red);color:#fff;border-bottom-color:var(--red-d)}
.btn.outline{background:#fff;color:var(--text);border:2px solid var(--line);border-bottom:4px solid var(--line)}
.btn.disabled{background:var(--bg-3);color:#fff;border-bottom-color:#A0A0A0;cursor:not-allowed}
.btn.disabled:active{transform:none;border-bottom-width:4px}

/* ===== RESULT ===== */
.result{flex:1;padding:32px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.result-emoji{font-size:80px;margin-bottom:16px}
.result-title{font-size:28px;font-weight:900;color:var(--green);margin-bottom:8px}
.result-title.fail{color:var(--red)}
.result-sub{font-size:15px;color:var(--text-light);margin-bottom:32px;font-weight:700}
.result-stats{display:flex;gap:14px;margin-bottom:36px;flex-wrap:wrap;justify-content:center}
.stat-card{background:#fff;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:14px 16px;min-width:130px}
.stat-card .stat-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card.xp .stat-label{color:var(--gold)}
.stat-card.acc .stat-label{color:var(--green)}
.stat-card.time .stat-label{color:var(--blue)}
.stat-card .stat-value{font-size:24px;font-weight:900}

/* ===== EMPTY / NO LIVES ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:24px 20px;text-align:center}
.modal-emoji{font-size:64px;margin-bottom:12px}
.modal-title{font-size:22px;font-weight:900;margin-bottom:8px}
.modal-text{font-size:14px;color:var(--text-light);font-weight:700;margin-bottom:20px}

/* ===== MASCOT (Foralín, el pájaro opositor) ===== */
.mascot-wrap{display:flex;align-items:flex-end;gap:10px;margin:0 0 18px 0;min-height:120px}
.mascot{width:108px;flex-shrink:0;animation:mascot-idle 3s ease-in-out infinite}
.mascot.bounce{animation:mascot-bounce .6s ease}
.mascot.shake{animation:mascot-shake .5s ease}
@keyframes mascot-idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes mascot-bounce{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-14px) rotate(-6deg)}60%{transform:translateY(-4px) rotate(4deg)}}
@keyframes mascot-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px) rotate(-3deg)}75%{transform:translateX(6px) rotate(3deg)}}
.mascot-bubble{position:relative;background:#fff;border:2px solid var(--line);border-bottom-width:3px;border-radius:14px;padding:10px 12px;font-size:13px;font-weight:800;color:var(--text);max-width:220px;line-height:1.35}
.mascot-bubble:before{content:'';position:absolute;left:-10px;bottom:14px;border:6px solid transparent;border-right-color:var(--line)}
.mascot-bubble:after{content:'';position:absolute;left:-7px;bottom:14px;border:6px solid transparent;border-right-color:#fff}
.mascot-bubble.ok{border-color:var(--green);color:var(--green-d)}
.mascot-bubble.ok:before{border-right-color:var(--green)}
.mascot-bubble.bad{border-color:var(--red);color:var(--red-d)}
.mascot-bubble.bad:before{border-right-color:var(--red)}

/* ===== EXAM CTA (banner en arbol) ===== */
.exam-cta{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#7C3AED,#A855F7);color:#fff;padding:14px 16px;border-radius:16px;border-bottom:4px solid #5B21B6;margin:8px 0 16px;cursor:pointer;transition:transform .1s;text-align:left;width:100%}
.exam-cta:active{transform:translateY(2px);border-bottom-width:2px}
.exam-cta .ec-icon{font-size:34px;flex-shrink:0}
.exam-cta .ec-body{flex:1;min-width:0}
.exam-cta .ec-title{font-size:16px;font-weight:900;line-height:1.2;margin-bottom:3px}
.exam-cta .ec-sub{font-size:12px;font-weight:700;opacity:.9}
.exam-cta .ec-arrow{font-size:22px;font-weight:900}

/* ===== EXAM CONFIG ===== */
.exam-cfg{padding:18px 20px;flex:1;display:flex;flex-direction:column}
.exam-cfg h2{font-size:22px;font-weight:900;margin-bottom:6px}
.exam-cfg .sub{font-size:13px;color:var(--text-light);font-weight:700;margin-bottom:18px}
.exam-cfg .info{background:#FFF6E0;border:2px solid #FFC800;border-bottom-width:3px;border-radius:12px;padding:10px 12px;font-size:12px;font-weight:800;color:#7A5A00;margin-bottom:18px;line-height:1.45}
.exam-cfg .mode-card{background:#fff;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:14px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;transition:transform .1s}
.exam-cfg .mode-card:active{transform:translateY(2px);border-bottom-width:2px}
.exam-cfg .mode-card.sel{border-color:#7C3AED;background:#F5EEFF}
.exam-cfg .mode-card .radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.exam-cfg .mode-card.sel .radio{border-color:#7C3AED}
.exam-cfg .mode-card.sel .radio:after{content:'';width:10px;height:10px;border-radius:50%;background:#7C3AED}
.exam-cfg .mode-card .mc-title{font-size:15px;font-weight:900;margin-bottom:3px}
.exam-cfg .mode-card .mc-sub{font-size:12px;color:var(--text-light);font-weight:700;line-height:1.4}
.exam-cfg .topics-wrap{margin-top:12px;background:var(--bg-2);border-radius:12px;padding:12px;max-height:340px;overflow-y:auto}
.exam-cfg .topic-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:800}
.exam-cfg .topic-row:hover{background:#fff}
.exam-cfg .topic-row .cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.exam-cfg .topic-row.sel .cb{background:#7C3AED;border-color:#7C3AED}
.exam-cfg .topic-row.sel .cb:after{content:'\2713'}
.exam-cfg .topic-row .ti{font-size:18px;width:22px;text-align:center}
.exam-cfg .topic-row .tn{flex:1;color:var(--text)}
.exam-cfg .topic-row .tc{font-size:11px;color:var(--text-light);font-weight:800}
.exam-cfg .section-name{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);padding:10px 8px 4px}
.exam-cfg .topics-actions{display:flex;gap:8px;padding:6px 8px 4px}
.exam-cfg .topics-actions button{font-size:11px;font-weight:900;text-transform:uppercase;color:#7C3AED;background:none;cursor:pointer;letter-spacing:.4px}
.exam-cfg .pool-info{margin-top:14px;text-align:center;font-size:13px;font-weight:800;color:var(--text-light)}
.exam-cfg .pool-info b{color:var(--text)}
.exam-cfg .pool-info.warn{color:var(--red-d)}
.exam-cfg .actions{padding:16px 0 8px;display:flex;flex-direction:column;gap:10px}
.btn-exam{background:#7C3AED;color:#fff;border-bottom-color:#5B21B6}

/* ===== EXAM RUNNING ===== */
.exam{flex:1;display:flex;flex-direction:column}
.exam-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:2px solid var(--line);position:sticky;top:0;z-index:5}
.exam-timer{display:flex;align-items:center;gap:6px;background:#F5EEFF;color:#5B21B6;padding:6px 12px;border-radius:20px;font-weight:900;font-size:15px;font-variant-numeric:tabular-nums}
.exam-timer.warn{background:#FFE5B0;color:#9A4F00}
.exam-timer.danger{background:#FFDFE0;color:var(--red-d);animation:tick 1s ease-in-out infinite}
@keyframes tick{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.exam-counter{font-weight:900;font-size:14px;color:var(--text-light);flex:1;text-align:center}
.exam-counter b{color:var(--text)}
.exam-quit{background:#fff;border:2px solid var(--line);border-bottom-width:3px;border-radius:10px;padding:5px 10px;font-size:12px;font-weight:900;color:var(--text-light);cursor:pointer;text-transform:uppercase;letter-spacing:.4px}
.exam-quit:active{transform:translateY(1px);border-bottom-width:1px}
.exam-body{flex:1;padding:18px 20px;overflow-y:auto}
.exam-q{font-size:18px;font-weight:800;line-height:1.4;margin-bottom:18px}
.exam-num{display:inline-block;background:#F5EEFF;color:#5B21B6;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:900;margin-bottom:10px;letter-spacing:.4px}
.exam-opts{display:flex;flex-direction:column;gap:10px}
.exam-opt{background:#fff;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:13px 14px;text-align:left;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .1s}
.exam-opt:active{transform:translateY(2px);border-bottom-width:2px}
.exam-opt.selected{border-color:#7C3AED;background:#F5EEFF;color:#5B21B6}
.exam-opt .opt-num{width:28px;height:28px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-light);font-weight:900;flex-shrink:0}
.exam-opt.selected .opt-num{border-color:#7C3AED;color:#7C3AED;background:#fff}
.exam-mark{margin-top:14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--text-light);cursor:pointer;padding:8px;border-radius:10px}
.exam-mark .mb{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}
.exam-mark.on .mb{background:var(--orange);border-color:var(--orange);color:#fff}
.exam-mark.on{color:var(--orange-d)}
.exam-foot{padding:12px 14px;border-top:2px solid var(--line);background:#fff;display:flex;gap:8px}
.exam-foot .btn{flex:1;padding:13px;font-size:14px}
.exam-foot .btn.outline.disabled{opacity:.4;cursor:not-allowed}
.exam-foot .btn.outline.disabled:active{transform:none;border-bottom-width:4px}
.exam-grid-wrap{padding:14px 20px;background:var(--bg-2);border-top:2px solid var(--line)}
.exam-grid-wrap h4{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:8px}
.exam-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
.exam-cell{aspect-ratio:1;border-radius:8px;background:#fff;border:2px solid var(--line);font-size:11px;font-weight:900;color:var(--text-light);display:flex;align-items:center;justify-content:center;cursor:pointer}
.exam-cell.done{background:#DDF4FF;border-color:var(--blue);color:var(--blue-d)}
.exam-cell.mark{background:#FFE5B0;border-color:var(--orange);color:var(--orange-d)}
.exam-cell.done.mark{background:#FFD9A0;border-color:var(--orange-d)}
.exam-cell.cur{outline:3px solid #7C3AED;outline-offset:1px}

/* ===== EXAM RESULT ===== */
.exam-res{flex:1;padding:24px 20px 80px;display:flex;flex-direction:column}
.exam-res .verdict{text-align:center;margin-bottom:18px}
.exam-res .verdict-emoji{font-size:64px;margin-bottom:6px}
.exam-res .verdict-title{font-size:24px;font-weight:900;margin-bottom:4px}
.exam-res .verdict-title.apto{color:var(--green)}
.exam-res .verdict-title.no{color:var(--red)}

/* ===== SPLASH ===== */
.splash{flex:1;background:linear-gradient(140deg,#58CC02 0%,#7BD81F 55%,#89E219 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:40px 20px;position:relative;overflow:hidden;animation:splash-in .35s ease-out}
.splash:before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 12%, rgba(255,255,255,.18) 0 60px, transparent 61px),radial-gradient(circle at 85% 80%, rgba(255,255,255,.14) 0 90px, transparent 91px),radial-gradient(circle at 70% 22%, rgba(255,255,255,.10) 0 40px, transparent 41px);pointer-events:none}
.splash-mascot{width:170px;animation:splash-bounce 1s ease-in-out infinite;filter:drop-shadow(0 10px 14px rgba(0,0,0,.18));z-index:1}
@keyframes splash-bounce{0%,100%{transform:translateY(0) rotate(0)}45%{transform:translateY(-18px) rotate(-4deg)}55%{transform:translateY(-18px) rotate(4deg)}}
.splash-logo{font-size:42px;font-weight:900;letter-spacing:.5px;margin-top:22px;text-shadow:0 3px 0 rgba(0,0,0,.18);z-index:1;animation:splash-fadein .55s ease-out .12s both}
.splash-tag{font-size:13px;font-weight:900;letter-spacing:2px;text-transform:uppercase;opacity:.95;margin-top:6px;z-index:1;animation:splash-fadein .55s ease-out .25s both}
.splash-bar{width:200px;height:8px;background:rgba(255,255,255,.28);border-radius:6px;overflow:hidden;margin-top:42px;z-index:1;animation:splash-fadein .55s ease-out .4s both}
.splash-fill{height:100%;width:0;background:#fff;border-radius:6px;box-shadow:0 0 14px rgba(255,255,255,.7);animation:splash-load 1.6s cubic-bezier(.22,.9,.36,1) forwards}
.splash-loadtext{font-size:11px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;opacity:.85;margin-top:14px;z-index:1;animation:splash-fadein .55s ease-out .55s both}
@keyframes splash-load{0%{width:0}100%{width:100%}}
@keyframes splash-fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes splash-in{from{opacity:0}to{opacity:1}}
.splash-out{animation:splash-out .35s ease-in forwards}
@keyframes splash-out{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.04)}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="data/oposiciones.js"></script>
<script src="data/preguntas.js"></script>
<script>
// ============ STATE ============
const STATE = {
  load(){
    const raw = localStorage.getItem('testforal_state_v2');
    if(raw){ try{ return JSON.parse(raw); }catch(e){} }
    return {
      oposicion: null,
      xp: 0,
      racha: 0,
      ultimoDia: null,
      vidas: 5,
      vidasReset: null,
      progreso: {}, // unidadId: { stars: 0-3, lessonesCompletadas: n }
      examenes: [] // historico simulacros: {ts, modo, unidades, total, aciertos, fallos, blancos, nota, tiempoSeg}
    };
  },
  save(s){ localStorage.setItem('testforal_state_v2', JSON.stringify(s)); }
};

let state = STATE.load();
if(!state.examenes) state.examenes = [];

// ============ MASCOT · Foralín, el león opositor ============
// León con traje gris, corbata, gafas de pasta y carpeta de apuntes

      <circle cx="60" cy="20" r="11" fill="url(#maneG)"/>
      <circle cx="76" cy="26" r="10" fill="url(#maneG)"/>
      <circle cx="88" cy="34" r="10" fill="url(#maneG)"/>
      <circle cx="90" cy="50" r="11" fill="url(#maneG)"/>

    <path d="M56 54 L64 54 L60 60 Z" fill="#3C3C3C" stroke="#000" stroke-width="0.5"/>

    <!-- Ojos -->

const MASCOT_LINES = {
  start: ['¡A por todas, opositor/a!','¿Listo/a para hincar codos?','Vamos al lío con el temario.','Hoy toca repasar. ¡Sin miedo!'],
  ok: ['¡Bien hecho!','¡Eso es!','¡Apruebas seguro!','¡Genio del temario!','Otra al saco 💼'],
  bad: ['Tranqui, esa cae siempre','Apúntalo en mi carpeta','Repasa esto un poco','Hasta los inspectores fallan','¡Al ataque otra vez!']
};
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }


function regenLives(){
  if(state.vidas>=5) return;
  if(!state.vidasReset) return;
  const now = Date.now();
  const elapsedMin = Math.floor((now - state.vidasReset)/60000);
  const regen = Math.floor(elapsedMin/30);
  if(regen>0){
    state.vidas = Math.min(5, state.vidas+regen);
    state.vidasReset = state.vidas>=5 ? null : state.vidasReset + regen*30*60000;
    STATE.save(state);
  }
}

function bumpRacha(){
  const today = new Date().toISOString().slice(0,10);
  if(state.ultimoDia === today) return;
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  state.racha = state.ultimoDia === yesterday ? state.racha+1 : 1;
  state.ultimoDia = today;
  STATE.save(state);
}

// ============ ROUTER ============
const app = document.getElementById('app');

function render(view, ctx){
  if(window._examTimer && view!=='exam'){ clearInterval(window._examTimer); window._examTimer = null; }
  regenLives();
  app.innerHTML = '';
  if(view==='splash') renderSplash();
  else if(view==='onb') renderOnboarding();
  else if(view==='tree') renderTree();
  else if(view==='lesson') renderLesson(ctx);
  else if(view==='result') renderResult(ctx);
  else if(view==='examConfig') renderExamConfig();
  else if(view==='exam') renderExam(ctx);
  else if(view==='examResult') renderExamResult(ctx);
}

// ============ SPLASH ============
function renderSplash(){
  app.innerHTML = `
    <div class="splash" id="splash">
      <div class="splash-mascot">${mascotSVG()}</div>
      <div class="splash-logo">TestForal</div>
      <div class="splash-tag">Oposiciones de Bizkaia</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
      <div class="splash-loadtext">Preparando tu temario…</div>
    </div>
  `;
  setTimeout(()=>{
    const s = document.getElementById('splash');
    if(s) s.classList.add('splash-out');
    setTimeout(()=>{
      if(!state.oposicion) render('onb');
      else render('tree');
    }, 320);
  }, 1700);
}

function topBar(mode){
  // mode: 'none' | 'exit'  (en el arbol mostramos boton Salir; en onboarding nada)
  const left = mode==='exit'
    ? `<button class="btn-exit" id="exit"><span class="ic">🚪</span>Salir</button>`
    : `<span></span>`;
  return `
    <div class="topbar">
      ${left}
      <div style="display:flex;gap:14px;align-items:center">
        <span class="topbar-stat streak"><span class="icon">🔥</span>${state.racha}</span>
        <span class="topbar-stat gem"><span class="icon">💎</span>${state.xp}</span>
        <span class="topbar-stat lives"><span class="icon">❤️</span>${state.vidas}</span>
      </div>
    </div>
  `;
}

// ============ ONBOARDING ============
const OPO_ICONS = {
  'agente-hacienda':'🏛️',
  'subinspector-tributos':'🔍',
  'administrativo-foral':'📋',
  'liquidador-tmgaf':'🧾'
};

function renderOnboarding(){
  app.innerHTML = `
    ${topBar('none')}
    <div class="onb">
      <div class="onb-mascot">
        <div class="m">${mascotSVG()}</div>
        <div class="b">¿A qué oposición te presentas?</div>
      </div>
      <div class="onb-grid" id="opos"></div>
    </div>
  `;
  const c = document.getElementById('opos');
  OPOSICIONES.forEach(op=>{
    const live = op.estado === 'activa';
    const icon = OPO_ICONS[op.id] || '📚';
    const c1 = document.createElement('div');
    c1.className = 'opo-card'+(live?'':' disabled');
    c1.innerHTML = `
      <div class="opo-icon">${live?icon:'🔒'}</div>
      <div class="opo-body">
        <div class="opo-title">${op.nombre}</div>
        <div class="opo-org">${op.organismo}</div>
        <span class="opo-pill ${live?'live':'soon'}">${live?'Disponible':'Próximamente'}</span>
      </div>
    `;
    if(live){
      c1.onclick = ()=>{
        state.oposicion = op.id;
        STATE.save(state);
        render('tree');
      };
    }
    c.appendChild(c1);
  });
}

// ============ TREE ============
function getOpo(){ return OPOSICIONES.find(o=>o.id===state.oposicion); }

function renderTree(){
  const op = getOpo();
  if(!op){ render('onb'); return; }
  const sectionsHTML = op.secciones.map(sec=>{
    const unitsHTML = sec.unidades.map((u,i)=>{
      const prog = state.progreso[u.id] || {stars:0, completed:false};
      let cls = '';
      if(prog.completed) cls = 'done';
      else if(i>0 && !state.progreso[sec.unidades[i-1].id]?.completed && !state.progreso[u.id]) cls = 'locked';
      const isCurrent = !prog.completed && cls!=='locked';
      const row = i % 5;
      return `
        <div class="unit-row r${row}">
          <div class="unit ${cls}" data-uid="${u.id}">
            ${isCurrent?`<div class="unit-bubble">EMPIEZA</div>`:''}
            <button class="unit-btn">${prog.completed?'⭐':u.icono}</button>
            <div class="unit-label">${u.nombre}</div>
          </div>
        </div>
      `;
    }).join('');
    return `
      <div class="section-header">
        <div class="section-banner" style="background:${sec.color};border-bottom-color:${sec.color}cc">
          <span class="emoji">${sec.emoji}</span>
          <div style="flex:1;text-align:left">
            <div class="title">Sección</div>
            <div class="sub">${sec.nombre}</div>
          </div>
        </div>
      </div>
      ${unitsHTML}
    `;
  }).join('');

  const totalPool = (window.PREGUNTAS||[]).filter(p=>op.secciones.some(s=>s.unidades.some(u=>u.id===p.unidad))).length;
  const ultimoExam = (state.examenes||[]).slice().reverse().find(e=>e.opo===op.id);
  const examSubtitle = ultimoExam
    ? `Tu ultima nota: <b>${ultimoExam.nota.toFixed(1)}/10</b> &middot; ${ultimoExam.aciertos}/${ultimoExam.total} aciertos`
    : `50 preguntas &middot; 60 min &middot; nota /10 con regla 3:1`;
  const examEnabled = totalPool >= 50;
  app.innerHTML = `
    ${topBar('exit')}
    <div class="tree">
      <div style="text-align:center;font-size:22px;font-weight:900;margin:8px 0 4px">${op.nombre}</div>
      <div style="text-align:center;font-size:13px;color:var(--text-light);font-weight:700;margin-bottom:8px">${op.organismo}</div>
      <button class="exam-cta" id="exam-cta" ${examEnabled?'':'disabled style="opacity:.55;cursor:not-allowed"'}>
        <div class="ec-icon">📝</div>
        <div class="ec-body">
          <div class="ec-title">${examEnabled?'Simulacro de examen':'Simulacro (proximamente)'}</div>
          <div class="ec-sub">${examEnabled?examSubtitle:`Faltan preguntas: hay ${totalPool}/50 minimo`}</div>
        </div>
        <div class="ec-arrow">›</div>
      </button>
      ${sectionsHTML}
    </div>
  `;
  if(examEnabled){
    document.getElementById('exam-cta').onclick = ()=>render('examConfig');
  }
  document.getElementById('exit').onclick = ()=>{
    if(!confirm('¿Salir y elegir otra oposición?\nTu progreso se guarda igual.')) return;
    state.oposicion = null;
    STATE.save(state);
    render('onb');
  };
  document.querySelectorAll('.unit:not(.locked)').forEach(el=>{
    el.onclick = ()=>{
      const uid = el.dataset.uid;
      startLesson(uid);
    };
  });
}

// ============ LESSON ============
function startLesson(unitId){
  if(state.vidas<=0){
    showNoLivesModal();
    return;
  }
  const pool = PREGUNTAS.filter(p=>p.unidad===unitId);
  if(pool.length===0){
    alert('Esta unidad aún no tiene preguntas. Próximamente.');
    return;
  }
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  const N = Math.min(5, shuffled.length);
  const ctx = {
    unitId,
    questions: shuffled.slice(0,N),
    idx: 0,
    correct: 0,
    wrong: 0,
    selectedIdx: null,
    answered: false,
    startTime: Date.now()
  };
  render('lesson', ctx);
}

function renderLesson(ctx){
  const q = ctx.questions[ctx.idx];
  const pct = Math.round(ctx.idx/ctx.questions.length*100);
  app.innerHTML = `
    <div class="lesson">
      <div class="progress-bar-wrap">
        <button class="progress-close" id="quit">✕</button>
        <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
        <span class="topbar-stat lives" style="font-size:14px">❤️${state.vidas}</span>
      </div>
      <div class="lesson-content">
        <div class="mascot-wrap">
          <div class="mascot" id="mascot">${mascotSVG()}</div>
          <div class="mascot-bubble" id="mascot-bubble">${pick(MASCOT_LINES.start)}</div>
        </div>
        <div class="q-text">${q.pregunta}</div>
        <div class="options" id="options">
          ${q.opciones.map((o,i)=>`
            <button class="opt" data-i="${i}">
              <div class="opt-num">${String.fromCharCode(65+i)}</div>
              <div>${o}</div>
            </button>
          `).join('')}
        </div>
      </div>
      <div id="action-bar" style="padding:18px 20px;border-top:2px solid var(--line)">
        <button class="btn disabled" id="check">Comprobar</button>
      </div>
    </div>
  `;
  document.getElementById('quit').onclick = ()=>{ if(confirm('¿Salir de la lección? Perderás el progreso.')) render('tree'); };
  document.querySelectorAll('.opt').forEach(b=>{
    b.onclick = ()=>{
      if(ctx.answered) return;
      ctx.selectedIdx = +b.dataset.i;
      document.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
      const btn = document.getElementById('check');
      btn.classList.remove('disabled');
      btn.classList.add('primary');
    };
  });
  document.getElementById('check').onclick = ()=>{
    if(ctx.selectedIdx===null) return;
    if(ctx.answered) return nextQ(ctx);
    answerQ(ctx);
  };
}

function answerQ(ctx){
  const q = ctx.questions[ctx.idx];
  const ok = ctx.selectedIdx === q.correcta;
  ctx.answered = true;
  if(ok){ ctx.correct++; state.xp += 10; }
  else{
    ctx.wrong++;
    state.vidas = Math.max(0, state.vidas-1);
    if(state.vidas===0) state.vidasReset = Date.now();
    else if(!state.vidasReset) state.vidasReset = Date.now();
  }
  STATE.save(state);

  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.classList.remove('selected');
    if(i===q.correcta) b.classList.add('ok');
    if(i===ctx.selectedIdx && !ok) b.classList.add('bad');
  });

  const mascot = document.getElementById('mascot');
  const bubble = document.getElementById('mascot-bubble');
  if(mascot && bubble){
    mascot.classList.remove('bounce','shake');
    void mascot.offsetWidth;
    mascot.classList.add(ok?'bounce':'shake');
    bubble.classList.remove('ok','bad');
    bubble.classList.add(ok?'ok':'bad');
    bubble.textContent = pick(ok?MASCOT_LINES.ok:MASCOT_LINES.bad);
  }

  const ab = document.getElementById('action-bar');
  ab.innerHTML = `
    <div class="feedback ${ok?'ok':'bad'}" style="margin:0;padding:14px 16px;border-radius:14px;border-top:0">
      <div class="feedback-title">${ok?'✅ ¡Correcto!':'❌ Incorrecto'}</div>
      <div class="feedback-explain">${q.explicacion||''}</div>
      <button class="btn ${ok?'primary':'danger'}" id="next">Continuar</button>
    </div>
  `;
  document.getElementById('next').onclick = ()=>nextQ(ctx);

  if(state.vidas===0){
    setTimeout(()=>showNoLivesModal(), 800);
  }
}

function nextQ(ctx){
  ctx.idx++;
  ctx.selectedIdx = null;
  ctx.answered = false;
  if(ctx.idx >= ctx.questions.length){
    finishLesson(ctx);
  } else {
    renderLesson(ctx);
  }
}

function finishLesson(ctx){
  const total = ctx.questions.length;
  const acc = Math.round(ctx.correct/total*100);
  const passed = ctx.correct >= Math.ceil(total*0.6);
  if(passed){
    state.progreso[ctx.unitId] = {completed:true, stars:acc>=90?3:acc>=70?2:1};
    state.xp += 20;
    bumpRacha();
    STATE.save(state);
  }
  render('result', {ctx, passed, acc, time: Math.round((Date.now()-ctx.startTime)/1000)});
}

// ============ RESULT ============
function renderResult({ctx, passed, acc, time}){
  app.innerHTML = `
    <div class="result">
      <div class="result-emoji">${passed?'🎉':'😢'}</div>
      <div class="result-title ${passed?'':'fail'}">${passed?'¡Lección completada!':'Inténtalo de nuevo'}</div>
      <div class="result-sub">${passed?'Has dominado este tema':'Necesitas al menos 60% de aciertos'}</div>
      <div class="result-stats">
        <div class="stat-card xp"><div class="stat-label">XP</div><div class="stat-value">+${ctx.correct*10 + (passed?20:0)}</div></div>
        <div class="stat-card acc"><div class="stat-label">Aciertos</div><div class="stat-value">${acc}%</div></div>
        <div class="stat-card time"><div class="stat-label">Tiempo</div><div class="stat-value">${time}s</div></div>
      </div>
      <button class="btn primary" id="continue" style="max-width:300px">Continuar</button>
    </div>
  `;
  document.getElementById('continue').onclick = ()=>render('tree');
}

// ============ EXAM ============
const EXAM_CFG = { N: 50, MIN_SEG: 60*60, PEN: 3 }; // 50 preguntas, 60 min, 3 fallos = 1 acierto

let examConfigDraft = null; // { modo:'mix'|'temas', unidades:Set<string> }

function getOpoUnidades(op){
  const out = [];
  op.secciones.forEach(s=>{
    s.unidades.forEach(u=>{
      const count = (window.PREGUNTAS||[]).filter(p=>p.unidad===u.id).length;
      out.push({ ...u, secNombre: s.nombre, secColor: s.color, secEmoji: s.emoji, count });
    });
  });
  return out;
}

function poolForExam(op, modo, unidadesSet){
  const allowed = new Set();
  op.secciones.forEach(s=>s.unidades.forEach(u=>{
    if(modo==='mix' || unidadesSet.has(u.id)) allowed.add(u.id);
  }));
  return (window.PREGUNTAS||[]).filter(p=>allowed.has(p.unidad));
}

function renderExamConfig(){
  const op = getOpo();
  if(!op){ render('onb'); return; }
  if(!examConfigDraft || examConfigDraft._opo !== op.id){
    examConfigDraft = { _opo: op.id, modo: 'mix', unidades: new Set() };
  }
  const unidades = getOpoUnidades(op);
  const totalGlobal = unidades.reduce((s,u)=>s+u.count, 0);

  // Agrupar por seccion para el listado
  const seccionesHTML = op.secciones.map(sec=>{
    const us = unidades.filter(u=>sec.unidades.some(x=>x.id===u.id));
    const rows = us.map(u=>{
      const sel = examConfigDraft.unidades.has(u.id);
      return `
        <div class="topic-row ${sel?'sel':''}" data-uid="${u.id}">
          <div class="cb"></div>
          <div class="ti">${u.icono}</div>
          <div class="tn">${u.nombre}</div>
          <div class="tc">${u.count}</div>
        </div>
      `;
    }).join('');
    return `<div class="section-name">${sec.emoji} ${sec.nombre}</div>${rows}`;
  }).join('');

  app.innerHTML = `
    ${topBar('none')}
    <div class="exam-cfg">
      <h2>📝 Simulacro de examen</h2>
      <div class="sub">${op.nombre}</div>
      <div class="info">⏱️ <b>50 preguntas</b> en <b>60 minutos</b>. Penalizacion: <b>3 fallos = 1 acierto</b>. Las preguntas en blanco no penalizan. Apto a partir de <b>5/10</b>.</div>

      <div class="mode-card ${examConfigDraft.modo==='mix'?'sel':''}" id="mode-mix">
        <div class="radio"></div>
        <div>
          <div class="mc-title">Mix global</div>
          <div class="mc-sub">50 preguntas aleatorias de todo el temario (${totalGlobal} disponibles)</div>
        </div>
      </div>
      <div class="mode-card ${examConfigDraft.modo==='temas'?'sel':''}" id="mode-temas">
        <div class="radio"></div>
        <div>
          <div class="mc-title">Por temas</div>
          <div class="mc-sub">Tu eliges los temas. Util para repasar bloques concretos.</div>
        </div>
      </div>

      <div id="topics-block" style="display:${examConfigDraft.modo==='temas'?'block':'none'}">
        <div class="topics-actions">
          <button id="t-all">Marcar todo</button>
          <button id="t-none">Quitar todo</button>
        </div>
        <div class="topics-wrap" id="topics">${seccionesHTML}</div>
      </div>

      <div class="pool-info" id="pool-info"></div>

      <div class="actions">
        <button class="btn btn-exam primary" id="start-exam">Empezar examen</button>
        <button class="btn outline" id="back-exam">Volver al arbol</button>
      </div>
    </div>
  `;

  function refreshPool(){
    const pool = poolForExam(op, examConfigDraft.modo, examConfigDraft.unidades);
    const el = document.getElementById('pool-info');
    const startBtn = document.getElementById('start-exam');
    if(pool.length < EXAM_CFG.N){
      el.classList.add('warn');
      el.innerHTML = `Solo hay <b>${pool.length}</b> preguntas en la seleccion. Necesitas al menos <b>${EXAM_CFG.N}</b>.`;
      startBtn.classList.add('disabled');
      startBtn.classList.remove('primary');
    } else {
      el.classList.remove('warn');
      el.innerHTML = `<b>${pool.length}</b> preguntas en la seleccion. Se eligiran ${EXAM_CFG.N} al azar.`;
      startBtn.classList.remove('disabled');
      startBtn.classList.add('primary');
    }
  }
  refreshPool();

  document.getElementById('mode-mix').onclick = ()=>{ examConfigDraft.modo='mix'; renderExamConfig(); };
  document.getElementById('mode-temas').onclick = ()=>{ examConfigDraft.modo='temas'; renderExamConfig(); };
  document.getElementById('back-exam').onclick = ()=>render('tree');

  document.querySelectorAll('.topic-row').forEach(r=>{
    r.onclick = ()=>{
      const uid = r.dataset.uid;
      if(examConfigDraft.unidades.has(uid)) examConfigDraft.unidades.delete(uid);
      else examConfigDraft.unidades.add(uid);
      r.classList.toggle('sel');
      refreshPool();
    };
  });

  const tAll = document.getElementById('t-all');
  const tNone = document.getElementById('t-none');
  if(tAll) tAll.onclick = ()=>{ unidades.forEach(u=>{ if(u.count>0) examConfigDraft.unidades.add(u.id); }); renderExamConfig(); };
  if(tNone) tNone.onclick = ()=>{ examConfigDraft.unidades.clear(); renderExamConfig(); };

  document.getElementById('start-exam').onclick = ()=>{
    const pool = poolForExam(op, examConfigDraft.modo, examConfigDraft.unidades);
    if(pool.length < EXAM_CFG.N) return;
    if(examConfigDraft.modo==='temas' && examConfigDraft.unidades.size===0) return;
    if(!confirm(`¿Empezar simulacro?\n\n${EXAM_CFG.N} preguntas en ${EXAM_CFG.MIN_SEG/60} min.\nNo se pierden vidas.`)) return;
    startExam(pool);
  };
}

function startExam(pool){
  const shuffled = [...pool].sort(()=>Math.random()-0.5).slice(0, EXAM_CFG.N);
  const ctx = {
    questions: shuffled,
    idx: 0,
    respuestas: new Array(shuffled.length).fill(null),
    marcadas: new Array(shuffled.length).fill(false),
    inicioTs: Date.now(),
    tiempoRestante: EXAM_CFG.MIN_SEG,
    modo: examConfigDraft.modo,
    unidades: examConfigDraft.modo==='temas' ? Array.from(examConfigDraft.unidades) : null,
    finalizado: false
  };
  render('exam', ctx);
}

function fmtTimer(s){
  const m = Math.floor(s/60);
  const ss = s%60;
  return `${m.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
}

function renderExam(ctx){
  const q = ctx.questions[ctx.idx];
  const total = ctx.questions.length;
  const respondidas = ctx.respuestas.filter(r=>r!==null).length;

  const cellsHTML = ctx.questions.map((_,i)=>{
    const cls = [];
    if(ctx.respuestas[i]!==null) cls.push('done');
    if(ctx.marcadas[i]) cls.push('mark');
    if(i===ctx.idx) cls.push('cur');
    return `<button class="exam-cell ${cls.join(' ')}" data-i="${i}">${i+1}</button>`;
  }).join('');

  const optsHTML = q.opciones.map((o,i)=>{
    const sel = ctx.respuestas[ctx.idx] === i;
    return `
      <button class="exam-opt ${sel?'selected':''}" data-i="${i}">
        <div class="opt-num">${String.fromCharCode(65+i)}</div>
        <div>${o}</div>
      </button>
    `;
  }).join('');

  const isLast = ctx.idx === total-1;
  const isFirst = ctx.idx === 0;
  const marked = ctx.marcadas[ctx.idx];

  app.innerHTML = `
    <div class="exam">
      <div class="exam-bar">
        <div class="exam-timer" id="timer">⏱️ ${fmtTimer(ctx.tiempoRestante)}</div>
        <div class="exam-counter">Pregunta <b>${ctx.idx+1}</b> / ${total} &middot; respondidas <b>${respondidas}</b></div>
        <button class="exam-quit" id="quit-exam">Salir</button>
      </div>
      <div class="exam-body">
        <div class="exam-num">PREGUNTA ${ctx.idx+1}</div>
        <div class="exam-q">${q.pregunta}</div>
        <div class="exam-opts">${optsHTML}</div>
        <button class="exam-mark ${marked?'on':''}" id="mark"><span class="mb">${marked?'★':''}</span> Marcar para revisar</button>
      </div>
      <div class="exam-grid-wrap">
        <h4>Navegacion (${respondidas}/${total} respondidas)</h4>
        <div class="exam-grid">${cellsHTML}</div>
      </div>
      <div class="exam-foot">
        <button class="btn outline ${isFirst?'disabled':''}" id="prev">‹ Anterior</button>
        ${isLast
          ? `<button class="btn danger" id="finish">Finalizar</button>`
          : `<button class="btn btn-exam primary" id="next">Siguiente ›</button>`}
      </div>
    </div>
  `;

  // Timer (1 unico interval por sesion)
  if(window._examTimer){ clearInterval(window._examTimer); }
  window._examTimer = setInterval(()=>{
    if(ctx.finalizado){ clearInterval(window._examTimer); window._examTimer=null; return; }
    ctx.tiempoRestante = Math.max(0, ctx.tiempoRestante - 1);
    const t = document.getElementById('timer');
    if(t){
      t.textContent = `⏱️ ${fmtTimer(ctx.tiempoRestante)}`;
      t.classList.toggle('warn', ctx.tiempoRestante<=300 && ctx.tiempoRestante>60);
      t.classList.toggle('danger', ctx.tiempoRestante<=60);
    }
    if(ctx.tiempoRestante<=0){
      clearInterval(window._examTimer); window._examTimer=null;
      finishExam(ctx, true);
    }
  }, 1000);

  document.querySelectorAll('.exam-opt').forEach(b=>{
    b.onclick = ()=>{
      const i = +b.dataset.i;
      ctx.respuestas[ctx.idx] = (ctx.respuestas[ctx.idx]===i) ? null : i;
      renderExam(ctx);
    };
  });
  document.querySelectorAll('.exam-cell').forEach(c=>{
    c.onclick = ()=>{ ctx.idx = +c.dataset.i; renderExam(ctx); };
  });
  document.getElementById('mark').onclick = ()=>{
    ctx.marcadas[ctx.idx] = !ctx.marcadas[ctx.idx];
    renderExam(ctx);
  };
  const prev = document.getElementById('prev');
  if(prev) prev.onclick = ()=>{ if(ctx.idx>0){ ctx.idx--; renderExam(ctx); } };
  const next = document.getElementById('next');
  if(next) next.onclick = ()=>{ if(ctx.idx<total-1){ ctx.idx++; renderExam(ctx); } };
  const fin = document.getElementById('finish');
  if(fin) fin.onclick = ()=>{
    const sinResp = ctx.respuestas.filter(r=>r===null).length;
    const msg = sinResp>0
      ? `Te quedan ${sinResp} preguntas en blanco.\n¿Finalizar de todos modos?`
      : `¿Finalizar el examen?`;
    if(confirm(msg)) finishExam(ctx, false);
  };
  document.getElementById('quit-exam').onclick = ()=>{
    if(confirm('¿Salir del examen? Se perdera el progreso del simulacro.')){
      ctx.finalizado = true;
      if(window._examTimer){ clearInterval(window._examTimer); window._examTimer=null; }
      render('tree');
    }
  };
}

function finishExam(ctx, porTiempo){
  ctx.finalizado = true;
  if(window._examTimer){ clearInterval(window._examTimer); window._examTimer=null; }
  const total = ctx.questions.length;
  let aciertos=0, fallos=0, blancos=0;
  ctx.questions.forEach((q,i)=>{
    const r = ctx.respuestas[i];
    if(r===null) blancos++;
    else if(r===q.correcta) aciertos++;
    else fallos++;
  });
  const netos = aciertos - fallos/EXAM_CFG.PEN;
  const nota = Math.max(0, (netos/total)*10);
  const tiempoSeg = Math.round((Date.now()-ctx.inicioTs)/1000);
  const apto = nota >= 5;

  // Histroico
  const op = getOpo();
  state.examenes = state.examenes || [];
  state.examenes.push({
    ts: Date.now(),
    opo: op?.id || null,
    modo: ctx.modo,
    unidades: ctx.unidades,
    total, aciertos, fallos, blancos,
    nota: Math.round(nota*10)/10,
    tiempoSeg,
    apto,
    porTiempo: !!porTiempo
  });
  // Bonus XP
  state.xp += aciertos*5 + (apto ? 100 : 0);
  if(apto) bumpRacha();
  STATE.save(state);

  render('examResult', { ctx, total, aciertos, fallos, blancos, nota, tiempoSeg, apto, porTiempo });
}

function renderExamResult(r){
  const { ctx, total, aciertos, fallos, blancos, nota, tiempoSeg, apto, porTiempo } = r;
  const notaStr = nota.toFixed(1).replace('.', ',');
  const min = Math.floor(tiempoSeg/60);
  const sec = tiempoSeg%60;

  const fallosArr = ctx.questions.map((q,i)=>{
    const resp = ctx.respuestas[i];
    return { q, i, resp };
  }).filter(x => x.resp===null || x.resp!==x.q.correcta);

  const revHTML = fallosArr.map(x=>{
    const blank = x.resp===null;
    const yourLine = blank
      ? `<div class="rev-line bl"><span class="lab">Sin responder</span></div>`
      : `<div class="rev-line ko"><span class="lab">Tu</span> ${String.fromCharCode(65+x.resp)}. ${x.q.opciones[x.resp]}</div>`;
    return `
      <div class="rev ${blank?'bl':''}">
        <div class="rev-q">${x.i+1}. ${x.q.pregunta}</div>
        ${yourLine}
        <div class="rev-line ok"><span class="lab">Correcta</span> ${String.fromCharCode(65+x.q.correcta)}. ${x.q.opciones[x.q.correcta]}</div>
        ${x.q.explicacion?`<div class="rev-exp">${x.q.explicacion}</div>`:''}
      </div>
    `;
  }).join('') || `<div style="text-align:center;color:var(--text-light);font-weight:800;padding:14px">Sin fallos. ¡Perfecto!</div>`;

  const verdictTitle = apto ? '¡Apto!' : 'No apto';
  const verdictSub = porTiempo
    ? 'Se acabo el tiempo'
    : (apto ? 'Has superado el simulacro' : 'Necesitas un 5/10 para aprobar');
  const emoji = apto ? '🎉' : '💪';

  app.innerHTML = `
    ${topBar('none')}
    <div class="exam-res">
      <div class="verdict">
        <div class="verdict-emoji">${emoji}</div>
        <div class="verdict-title ${apto?'apto':'no'}">${verdictTitle}</div>
        <div class="verdict-sub">${verdictSub}</div>
      </div>
      <div class="nota-circle ${apto?'apto':'no'}">
        <div class="nota-num">${notaStr}</div>
        <div class="nota-de">/ 10</div>
        <div class="nota-cap">${apto?'APTO':'NO APTO'}</div>
      </div>
      <div class="stat-row">
        <div class="stat ok"><div class="lbl">Aciertos</div><div class="val">${aciertos}</div></div>
        <div class="stat ko"><div class="lbl">Fallos</div><div class="val">${fallos}</div></div>
        <div class="stat bl"><div class="lbl">Blanco</div><div class="val">${blancos}</div></div>
        <div class="stat tm"><div class="lbl">Tiempo</div><div class="val">${min}:${sec.toString().padStart(2,'0')}</div></div>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--text-light);font-weight:700;margin-bottom:8px">
        ${aciertos} aciertos &minus; ${fallos}/${EXAM_CFG.PEN} = <b>${(aciertos - fallos/EXAM_CFG.PEN).toFixed(2)}</b> netos sobre ${total}
      </div>
      <div class="actions">
        <button class="btn btn-exam primary" id="r-again">Hacer otro simulacro</button>
        <button class="btn outline" id="r-tree">Volver al arbol</button>
      </div>
      <div class="review-h">Revision (${fallosArr.length})</div>
      ${revHTML}
    </div>
  `;
  document.getElementById('r-again').onclick = ()=>render('examConfig');
  document.getElementById('r-tree').onclick = ()=>render('tree');
}

// ============ NO LIVES MODAL ============
function showNoLivesModal(){
  const minutes = state.vidasReset ? Math.max(1, 30 - Math.floor((Date.now()-state.vidasReset)/60000)) : 30;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-emoji">💔</div>
      <div class="modal-title">¡Sin vidas!</div>
      <div class="modal-text">Recuperarás una vida en unos ${minutes} min.<br>Mientras tanto repasa los temas que ya hiciste.</div>
      <button class="btn primary" id="m-ok">Entendido</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#m-ok').onclick = ()=>{
    overlay.remove();
    render('tree');
  };
}

// ============ INIT ============
function init(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
  render('splash');
}
init();
</script>
